<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Aposta Mestre</title>
</head>
<body>
  <h2>Cadastro</h2>
  <input type="text" id="fullname" placeholder="Nome completo" required /><br />
  <input type="text" id="cpf" placeholder="CPF" required /><br />
  <input type="email" id="email" placeholder="E-mail" required /><br />
  <input type="password" id="password" placeholder="Senha" required /><br />
  <button onclick="signup()">Cadastrar</button>

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="signup.js"></script>
</body>
</html>
