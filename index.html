
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aposta Mestre - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Aposta Mestre</h1>
    <form id="loginForm">
      <input type="text" id="nome" placeholder="Nome completo" required />
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="password" id="senha" placeholder="Senha" required />
      <input type="text" id="cpf" placeholder="CPF" required maxlength="14"/>
      <button type="submit">Entrar</button>
    </form>
    <div id="mensagemBoasVindas" class="hidden">
      <h2>Bem-vindo(a), <span id="usuarioNome"></span>!</h2>
      <p>Vamos começar? Siga o tutorial inicial.</p>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
